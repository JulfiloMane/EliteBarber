<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Barber — Painel Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body.admin-body { min-height:100vh; display:flex; flex-direction:column; }
  .admin-topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; border-bottom:1px solid var(--line); background:var(--bg-alt);
  }
  .admin-wrap { flex:1; padding:40px 24px; max-width:1180px; margin:0 auto; width:100%; }
  .login-box {
    max-width:380px; margin:80px auto; background:var(--bg-card);
    border:1px solid var(--line); border-radius:var(--radius); padding:32px;
  }
  .login-box h2 { text-align:center; margin-bottom:6px; }
  .login-box p.sub { text-align:center; color:var(--muted); margin-bottom:22px; font-size:.9rem;}
  table.bookings { width:100%; border-collapse:collapse; margin-top:20px; font-size:.9rem; }
  table.bookings th, table.bookings td { padding:10px 12px; border-bottom:1px solid var(--line); text-align:left; }
  table.bookings th { color:var(--gold); text-transform:uppercase; font-size:.75rem; letter-spacing:.06em; }
  .status-tag { padding:3px 10px; border-radius:20px; font-size:.75rem; text-transform:uppercase; }
  .status-tag.pendente { background:rgba(201,162,75,.15); color:var(--gold); }
  .status-tag.concluido { background:rgba(120,180,110,.15); color:#8fcf85; }
  .status-tag.cancelado { background:rgba(180,90,70,.15); color:#e08a6f; }
  .row-actions button { font-size:.75rem; padding:6px 10px; margin-right:6px; border-radius:4px; background:var(--bg-alt); color:var(--ivory); border:1px solid var(--line); }
  .row-actions button:hover { border-color:var(--gold); color:var(--gold); }
  .row-actions button.btn-delete { border-color:var(--rust); color:#e08a6f; }
  .row-actions button.btn-delete:hover { background:var(--rust); color:var(--ivory); border-color:var(--rust); }
  .toolbar { display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:10px;}
  .toolbar input, .toolbar select { background:var(--bg-alt); border:1px solid var(--line); color:var(--ivory); padding:9px 12px; border-radius:var(--radius); font-family:var(--font-body); }
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .stats-grid {
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:14px;
    margin-bottom:28px;
  }
  .stat-card {
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    text-align:left;
  }
  .stat-card .stat-label {
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    margin-bottom:6px;
  }
  .stat-card .stat-value {
    font-family:var(--font-display);
    font-size:2rem;
    color:var(--gold);
    line-height:1;
  }
  .stat-card.total {
    border-color:var(--gold-dark);
    background:linear-gradient(145deg, rgba(201,162,75,.10), var(--bg-card));
  }
  .stat-card.total .stat-value { color:var(--gold-soft); }
  @media (max-width: 960px){ .stats-grid{ grid-template-columns:repeat(3,1fr); } }
  @media (max-width: 600px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body class="admin-body">

<div class="admin-topbar">
  <a href="index.html" class="logo">ELITE <span>BARBER</span></a>
  <div id="topbarActions"></div>
</div>

<!-- ============== LOGIN ============== -->
<div class="admin-wrap" id="loginView">
  <div class="login-box">
    <h2 class="section-title" style="font-size:1.5rem;text-align:center;">Acesso administrativo</h2>
    <p class="sub">Área restrita à gestão da barbearia.</p>
    <form id="loginForm">
      <div class="field">
        <label for="usuario">Utilizador</label>
        <input type="text" id="usuario" required autocomplete="username">
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" style="width:100%;">Entrar</button>
      <div class="form-msg" id="loginMsg"></div>
    </form>
    <p style="margin-top:18px;font-size:.75rem;color:var(--muted);">
  
    </p>
  </div>
</div>

<!-- ============== PAINEL ============== -->
<div class="admin-wrap" id="panelView" style="display:none;">
  <h2 class="section-title" style="font-size:1.8rem;">Agendamentos</h2>
  <p class="section-lead" style="margin-bottom:20px;">Consulte, confirme ou cancele os agendamentos feitos pelos clientes no site.</p>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="toolbar">
    <input type="date" id="filtroData">
    <select id="ordenacao">
      <option value="proximo">Mais próximos primeiro</option>
      <option value="recente">Mais recentes (criados agora)</option>
    </select>
    <button class="btn outline" id="btnAtualizar">Atualizar lista</button>
  </div>

  <div id="tableWrap">
    <p class="empty-state">A carregar agendamentos...</p>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
